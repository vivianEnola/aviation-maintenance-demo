weather_knowledge:
  cumulonimbus: "积雨云常与雷暴、强降水、结冰、冰雹和强烈垂直气流相关。"
  stratocumulus: "层积云通常对应低层稳定或弱不稳定云层，可能伴随轻微降水和低云底。"
  typhoon_vortex: "白色涡旋状云系可能对应热带气旋结构，可能伴随强风、暴雨和大范围湍流。"

