weather_knowledge:
  cumulonimbus: "积雨云是大气强对流运动的终极形态，云体内蕴含着巨大的能量，常与雷暴、强降水、结冰、冰雹和强烈垂直气流相关，被称为“飞行的禁区”。"
  stratocumulus: "层积云总体上风险较低，但仍可能伴随云内或云底轻度至中度颠簸、低能见度、低云底以及轻度至中度积冰等现象。"
  typhoon_vortex: "白色涡旋状云系可能对应热带气旋结构，可能伴随强风、暴雨和大范围湍流。"
